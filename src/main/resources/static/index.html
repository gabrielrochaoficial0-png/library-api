<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library API</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <h1>📚 Library API</h1>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="books">Livros</button>
      <button class="tab-btn" data-tab="members">Membros</button>
      <button class="tab-btn" data-tab="loans">Empréstimos</button>
    </nav>
  </header>

  <main>
    <div id="toast" class="toast"></div>

    <!-- BOOKS -->
    <section id="books" class="tab-panel active">
      <div class="panel-header">
        <h2>Livros</h2>
        <button class="btn primary" id="btn-new-book">+ Novo livro</button>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>Título</th>
            <th>Autor</th>
            <th>ISBN</th>
            <th>Cópias (disp./total)</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="books-tbody"></tbody>
      </table>
    </section>

    <!-- MEMBERS -->
    <section id="members" class="tab-panel">
      <div class="panel-header">
        <h2>Membros</h2>
        <button class="btn primary" id="btn-new-member">+ Novo membro</button>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>Nome</th>
            <th>E-mail</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="members-tbody"></tbody>
      </table>
    </section>

    <!-- LOANS -->
    <section id="loans" class="tab-panel">
      <div class="panel-header">
        <h2>Empréstimos</h2>
        <button class="btn primary" id="btn-new-loan">+ Novo empréstimo</button>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>Livro</th>
            <th>Membro</th>
            <th>Empréstimo</th>
            <th>Vencimento</th>
            <th>Devolução</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="loans-tbody"></tbody>
      </table>
    </section>
  </main>

  <!-- BOOK MODAL -->
  <div class="modal-overlay" id="modal-book">
    <div class="modal">
      <h3 id="book-modal-title">Novo livro</h3>
      <form id="form-book">
        <input type="hidden" id="book-id">
        <label>Título</label>
        <input type="text" id="book-title" required>
        <label>Autor</label>
        <input type="text" id="book-author" required>
        <label>ISBN</label>
        <input type="text" id="book-isbn" required>
        <label>Total de cópias</label>
        <input type="number" id="book-totalCopies" min="1" required>
        <div class="form-errors" id="book-errors"></div>
        <div class="modal-actions">
          <button type="button" class="btn" data-close="modal-book">Cancelar</button>
          <button type="submit" class="btn primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MEMBER MODAL -->
  <div class="modal-overlay" id="modal-member">
    <div class="modal">
      <h3 id="member-modal-title">Novo membro</h3>
      <form id="form-member">
        <input type="hidden" id="member-id">
        <label>Nome</label>
        <input type="text" id="member-name" required>
        <label>E-mail</label>
        <input type="email" id="member-email" required>
        <div class="form-errors" id="member-errors"></div>
        <div class="modal-actions">
          <button type="button" class="btn" data-close="modal-member">Cancelar</button>
          <button type="submit" class="btn primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- LOAN MODAL -->
  <div class="modal-overlay" id="modal-loan">
    <div class="modal">
      <h3>Novo empréstimo</h3>
      <form id="form-loan">
        <label>Livro</label>
        <select id="loan-bookId" required></select>
        <label>Membro</label>
        <select id="loan-memberId" required></select>
        <div class="form-errors" id="loan-errors"></div>
        <div class="modal-actions">
          <button type="button" class="btn" data-close="modal-loan">Cancelar</button>
          <button type="submit" class="btn primary">Registrar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- CONFIRM MODAL -->
  <div class="modal-overlay" id="modal-confirm">
    <div class="modal">
      <h3 id="confirm-title">Confirmar ação</h3>
      <p id="confirm-message"></p>
      <div class="modal-actions">
        <button type="button" class="btn" data-close="modal-confirm">Cancelar</button>
        <button type="button" class="btn danger" id="confirm-ok">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
